sonar.projectKey=ericfisherdev_nestorage
sonar.organization=ericfisherdev-os


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=nestorage
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# *_templ.go is templ-generated (golangci-lint already skips it via
# exclusions.generated:strict in .golangci.yml) -- its defensive io.Writer
# error branches are impractical to exercise from a normal render test and
# would otherwise drag the new-code coverage gate down for markup that has
# no logic of its own. The vendored minified JS and the built Tailwind
# bundle are third-party/generated output, not source this repo authors --
# without excluding them the vendored JS alone fails the quality gate.
sonar.exclusions=**/*_templ.go,web/static/js/*.min.js,web/static/css/app.css

# Explicit test classification. Stated up front because leaving it unset makes
# the Go analyzer and the text/secrets analyzer disagree about what a test is:
# the former keys off the "_test.go" suffix, the latter also treats any
# directory named -- or ending in -- "test"/"tests"/"doc"/"docs" as tests and
# silently skips it.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Coverage import. The build job's `make test` writes coverage.out; the
# test-gated job's `make test-gated` writes coverage.gated.out. Two paths
# are listed because the database-gated suites run in a separate job --
# without a database those tests self-skip, so a single profile alone would
# report db-adjacent code as barely covered. Sonar unions both.
sonar.go.coverage.reportPaths=coverage.out,coverage.gated.out
