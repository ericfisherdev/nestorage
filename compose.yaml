# Local development services. Start with: docker compose up -d
# The default DATABASE_URL in internal/platform/config matches this service.
services:
  postgres:
    image: postgres:17-alpine
    container_name: nestorage-postgres
    environment:
      # Local-development credentials only — NOT for any shared or production
      # environment. Production must supply DATABASE_URL with real credentials.
      POSTGRES_USER: nestorage
      POSTGRES_PASSWORD: nestorage
      POSTGRES_DB: nestorage
    ports:
      # Bind to loopback only — this dev service has fixed local credentials
      # and must not be reachable from other hosts on the network. Host port
      # 5433, not Postgres's default 5432: Nestorage runs on the same host as
      # Nestova, whose own compose service already binds 127.0.0.1:5432. 5433
      # was checked free on this host (55433 is nestcore's gated-test
      # container, not a local dev service).
      - "127.0.0.1:5433:5432"
    volumes:
      - nestorage-pgdata:/var/lib/postgresql/data
      # Read-only: these scripts only ever run once, against a fresh volume —
      # see compose/initdb/01-test-database.sql.
      - ./compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestorage -d nestorage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nestorage-pgdata:
